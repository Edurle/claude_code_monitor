# 插件系统配置
# Claude Code × tmux HITL Monitor

version: "1.0"

# 全局设置
global:
  hot_reload: true      # 启用热重载
  auto_start: true      # 自动启动已启用的插件
  log_level: INFO       # 日志级别

# 插件配置
plugins:
  # 宠物插件
  builtin.pet:
    enabled: true
    priority: 50
    settings:
      pet_type: bunny           # bunny / fox / dragon
      enable_animations: true
      animation_fps: 10
      interaction_cooldown: 2.0
      mood_text_duration: 3.0

  # 成就插件
  builtin.achievements:
    enabled: true
    priority: 75
    settings:
      show_popup: true
      popup_duration: 2.5
      sound: false

  # 粒子效果插件
  builtin.particle_fx:
    enabled: true
    priority: 30
    settings:
      max_particles: 200
      effects:
        celebration:
          enabled: true
          trigger_on_achievement: true
        sparkle:
          enabled: true
          trigger_on_task: true
        ambient:
          enabled: false
          type: stars    # stars / snow / matrix

  # 边框粒子插件
  builtin.border_particles:
    enabled: true
    priority: 25
    settings:
      style: sparkle              # sparkle / flame_trail / matrix / neon_glow
      emit_rate_multiplier: 1.0   # 发射速率倍率
      particle_density: 1.0       # 粒子密度倍率

  # 顶部栏插件
  builtin.top-bar:
    enabled: true
    priority: 100

  # 任务队列插件
  builtin.task-queue:
    enabled: true
    priority: 100

  # 矩阵雨插件（与 Redmine 互斥，同时只启用一个）
  builtin.matrix-rain:
    enabled: false
    priority: 80

  # Redmine 任务查看插件
  builtin.redmine:
    enabled: true
    priority: 80
    settings:
      refresh_interval: 60   # 刷新间隔（秒）
      # redmine_url 和 api_key 请配置到 config/secrets.yaml

  # 神经网格插件
  builtin.neural-grid:
    enabled: true
    priority: 80

  # 状态栏插件
  builtin.status-bar:
    enabled: true
    priority: 100

  # 提示栏插件
  builtin.hints-bar:
    enabled: true
    priority: 90

  # 成就视图插件
  builtin.achievements-view:
    enabled: true
    priority: 75

  # 统计视图插件
  builtin.stats-view:
    enabled: true
    priority: 75
